<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isometric Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Level select overlay -->
  <div id="level-select-overlay">
    <div id="level-select-box">
      <h2>Select Level</h2>
      <div id="level-select-list"></div>
    </div>
  </div>

  <div id="fps">-- fps</div>
  <div id="version">v?.?.?</div>
  <div id="zoom-info">zoom 10.0</div>
  <div id="orientation" style="display:none"></div>
  <div id="hover-info"  style="display:none"></div>
  <div id="debug-ray-info" style="display:none"></div>
  <div id="hud">↑↓←→ / WASD &nbsp;Move &nbsp;|&nbsp; Space &nbsp;Jump &nbsp;|&nbsp; Z / C &nbsp;Rotate &nbsp;|&nbsp; RMB &nbsp;Pan &nbsp;|&nbsp; P &nbsp;Pause &nbsp;|&nbsp; Esc &nbsp;Settings</div>
  <div id="pan-indicator" style="display:none">PAN &nbsp;—&nbsp; X to re-centre</div>
  <div id="coords">0, 0</div>
  <div id="tile-info"></div>

  <!-- Pause overlay -->
  <div id="pause-overlay" class="hidden">
    <div id="pause-text">PAUSED</div>
    <div id="pause-hint">Press P to resume</div>
  </div>

  <!-- Settings overlay -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <div id="settings-title">Settings</div>

      <div class="settings-section-label">Movement</div>
      <div class="settings-row">
        <label for="s-move-delay">Move Delay (ms)</label>
        <input type="range"  id="s-move-delay" min="50"  max="300"  step="1"    />
        <input type="number" id="n-move-delay" min="50"  max="300"  step="1"    />
        <button class="btn-reset" data-reset="moveDelay" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-corner-sliding">Corner Sliding</label>
        <input type="checkbox" id="s-corner-sliding" />
        <button class="btn-reset" data-reset="cornerSliding" title="Reset to default">⟳</button>
      </div>

      <div class="settings-section-label">Physics</div>
      <div class="settings-row">
        <label for="s-jump-speed">Jump Speed</label>
        <input type="range"  id="s-jump-speed" min="3"   max="15"   step="0.1"  />
        <input type="number" id="n-jump-speed" min="3"   max="15"   step="0.1"  />
        <button class="btn-reset" data-reset="jumpSpeed" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row">
        <label for="s-gravity">Gravity</label>
        <input type="range"  id="s-gravity"    min="10"  max="40"   step="0.5"  />
        <input type="number" id="n-gravity"    min="10"  max="40"   step="0.5"  />
        <button class="btn-reset" data-reset="gravity" title="Reset to default">⟳</button>
      </div>

      <div class="settings-section-label">Camera</div>
      <div class="settings-row">
        <label for="s-cam-speed">Follow Speed</label>
        <input type="range"  id="s-cam-speed"  min="2"   max="20"   step="0.5"  />
        <input type="number" id="n-cam-speed"  min="2"   max="20"   step="0.5"  />
        <button class="btn-reset" data-reset="camFollowSpeed" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row">
        <label for="s-zoom">Zoom</label>
        <input type="range"  id="s-zoom"       min="6"   max="18"   step="0.5"  />
        <input type="number" id="n-zoom"       min="6"   max="18"   step="0.5"  />
        <button class="btn-reset" data-reset="viewSize" title="Reset to default">⟳</button>
      </div>

      <div class="settings-section-label">Visual</div>
      <div class="settings-row">
        <label for="s-fog">Fog Density</label>
        <input type="range"  id="s-fog"        min="0"   max="0.08" step="0.001"/>
        <input type="number" id="n-fog"        min="0"   max="0.08" step="0.001"/>
        <button class="btn-reset" data-reset="fogDensity" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-show-fps">Show FPS</label>
        <input type="checkbox" id="s-show-fps" />
        <button class="btn-reset" data-reset="showFps" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-show-compass">Show Compass</label>
        <input type="checkbox" id="s-show-compass" />
        <button class="btn-reset" data-reset="showCompass" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-show-ray">Show Eye Ray</label>
        <input type="checkbox" id="s-show-ray" />
        <button class="btn-reset" data-reset="showRay" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-show-axes">Show Axes (X/Y/Z)</label>
        <input type="checkbox" id="s-show-axes" />
        <button class="btn-reset" data-reset="showAxes" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-hover-raycast">Hover Raycast</label>
        <input type="checkbox" id="s-hover-raycast" />
        <button class="btn-reset" data-reset="hoverRaycast" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-debug-ray">Debug Raycast</label>
        <input type="checkbox" id="s-debug-ray" />
        <button class="btn-reset" data-reset="debugRay" title="Reset to default">⟳</button>
      </div>

      <div class="settings-section-label">Pathfinding</div>
      <div class="settings-row">
        <label for="s-path-delay">Step Delay (ms)</label>
        <input type="range"  id="s-path-delay" min="0" max="500" step="10" />
        <input type="number" id="n-path-delay" min="0" max="500" step="10" />
        <button class="btn-reset" data-reset="pathDelay" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-click-to-move">Click to Move</label>
        <input type="checkbox" id="s-click-to-move" />
        <button class="btn-reset" data-reset="clickToMove" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-show-path">Show Path</label>
        <input type="checkbox" id="s-show-path" />
        <button class="btn-reset" data-reset="showPathViz" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-show-dest">Show Destination</label>
        <input type="checkbox" id="s-show-dest" />
        <button class="btn-reset" data-reset="showDestViz" title="Reset to default">⟳</button>
      </div>
      <div class="settings-row checkbox-row">
        <label for="s-show-explore">Show Exploration</label>
        <input type="checkbox" id="s-show-explore" />
        <button class="btn-reset" data-reset="showExploreViz" title="Reset to default">⟳</button>
      </div>

      <div id="settings-buttons">
        <button id="btn-reset-all">Restore Defaults</button>
        <button id="btn-save">Save &amp; Apply</button>
        <button id="btn-close">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (async function () {
    function injectScript(src) {
      return new Promise(function (res, rej) {
        var s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    try {
      var manifest = await fetch('./levels/manifest.json').then(function (r) { return r.json(); });
      for (var i = 0; i < manifest.levels.length; i++) {
        await injectScript('./levels/' + manifest.levels[i]);
      }
    } catch (e) {
      console.warn('levels/manifest.json unavailable, loading level1.js directly', e);
      await injectScript('./levels/level1.js');
    }
    await injectScript('./game.js');
  })();
  </script>
</body>
</html>
